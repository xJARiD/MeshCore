[env:Xiao_S3_WIO_repeater_observer_mqtt]
extends = Xiao_S3_WIO
build_flags =
  ${Xiao_S3_WIO.build_flags}
  -D ADVERT_NAME='"MQTT Observer"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D MAX_NEIGHBOURS=50
  -D WITH_MQTT_BRIDGE=1
  -D MAX_MQTT_BROKERS=3
  -D MQTT_MAX_PACKET_SIZE=1024
  -D MQTT_DEBUG=1
  -D MESH_PACKET_LOGGING=1
  -D MESH_DEBUG=1
  -D CONFIG_MBEDTLS_CERTIFICATE_BUNDLE=y
  -D ESP32_CPU_FREQ=160
  -D MQTT_SERVER='"wss://mqtt2.eastmesh.au"'
  -D MQTT_PORT=443
  -D MQTT_PASSWORD='"jwt"'
  -D MQTT_AUDIENCE='"mqtt2.eastmesh.au"'
  -D MQTT_USE_WEBSOCKETS=1
  -D MQTT_USE_TLS=1
  -D MQTT_CUSTOM_CA_ISRG_ROOT_X1=1
#  -D WIFI_SSID='"ssid"'
#  -D WIFI_PWD='"password"'
#  -D MQTT_SERVER='"your-mqtt-broker.com"'
#  -D MQTT_PORT=1883
#  -D MQTT_USERNAME='"your-username"'
#  -D MQTT_PASSWORD='"your-password"'

build_src_filter = ${Xiao_S3_WIO.build_src_filter}
  +<helpers/bridges/MQTTBridge.cpp>
  +<helpers/MQTTMessageBuilder.cpp>
  +<helpers/JWTHelper.cpp>
  +<../examples/simple_repeater>
lib_deps =
  ${Xiao_S3_WIO.lib_deps}
  ${esp32_ota.lib_deps}
  elims/PsychicMqttClient@^0.2.4
  bblanchon/ArduinoJson
  arduino-libraries/NTPClient
  JChristensen/Timezone
  paulstoffregen/Time@1.6.1

